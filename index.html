<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stand Up 2k26 — Content Schedule</title>
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background-color:#0d0a05;background-image:radial-gradient(ellipse at 20% 10%,rgba(120,80,10,.18) 0%,transparent 60%),radial-gradient(ellipse at 80% 90%,rgba(80,40,0,.15) 0%,transparent 60%);min-height:100vh;font-family:'Inter',sans-serif;color:#e8d9b5;padding:0 0 80px}
    header{text-align:center;padding:56px 24px 40px;border-bottom:1px solid rgba(180,130,40,.25);position:relative}
    header::before{content:"☠";font-size:28px;position:absolute;left:32px;top:32px;opacity:.5}
    header::after{content:"☠";font-size:28px;position:absolute;right:32px;top:32px;opacity:.5}
    .skull-row{font-size:22px;letter-spacing:12px;opacity:.4;margin-bottom:12px}
    h1{font-family:'Pirata One',cursive;font-size:clamp(48px,10vw,96px);color:#d4a017;letter-spacing:4px;line-height:1.05;text-shadow:0 0 40px rgba(212,160,23,.35),2px 2px 0 #5a3a00}
    .subtitle{font-family:'Cinzel',serif;font-size:clamp(13px,2.5vw,16px);color:#a07830;letter-spacing:8px;text-transform:uppercase;margin-top:10px}
    .divider{display:flex;align-items:center;gap:12px;margin:14px auto 0;max-width:320px;color:#6b4f1a}
    .divider::before,.divider::after{content:"";flex:1;height:1px;background:linear-gradient(to right,transparent,#6b4f1a,transparent)}
    .divider span{font-size:18px}
    .live-clock{font-family:'Cinzel',serif;font-size:13px;color:#6b4f1a;letter-spacing:3px;margin-top:10px}

    main{max-width:780px;margin:48px auto 0;padding:0 20px;display:flex;flex-direction:column;gap:28px}

    .add-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border:1px dashed rgba(212,160,23,.4);border-radius:12px;background:rgba(212,160,23,.04);color:#c49010;font-family:'Cinzel',serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .2s}
    .add-btn:hover{background:rgba(212,160,23,.09);border-color:rgba(212,160,23,.7)}

    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:20px}
    .modal-bg.open{display:flex}
    .modal{background:#120e04;border:1px solid rgba(212,160,23,.4);border-radius:16px;padding:32px;width:100%;max-width:460px}
    .modal h2{font-family:'Cinzel',serif;color:#d4a017;font-size:18px;margin-bottom:24px;letter-spacing:2px}
    .field{margin-bottom:18px}
    .field label{display:block;font-size:12px;color:#8a6830;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;font-family:'Cinzel',serif}
    .field input,.field select,.field textarea{width:100%;background:#0d0a05;border:1px solid rgba(180,130,40,.35);border-radius:8px;padding:10px 14px;color:#e8d9b5;font-family:'Inter',sans-serif;font-size:14px;outline:none}
    .field input:focus,.field select:focus{border-color:rgba(212,160,23,.7)}
    .field select option{background:#0d0a05}
    .modal-actions{display:flex;gap:12px;margin-top:24px}
    .btn-cancel{flex:1;padding:11px;background:transparent;border:1px solid rgba(180,130,40,.3);border-radius:8px;color:#8a6830;font-family:'Cinzel',serif;font-size:13px;cursor:pointer}
    .btn-cancel:hover{background:rgba(255,255,255,.03)}
    .btn-save{flex:2;padding:11px;background:rgba(212,160,23,.15);border:1px solid rgba(212,160,23,.5);border-radius:8px;color:#d4a017;font-family:'Cinzel',serif;font-size:13px;letter-spacing:1px;cursor:pointer}
    .btn-save:hover{background:rgba(212,160,23,.25)}

    .day-card{border:1px solid rgba(180,130,40,.3);border-radius:12px;background:rgba(255,220,120,.04);overflow:hidden}
    .day-card.today{border-color:rgba(212,160,23,.65);background:rgba(212,160,23,.06);box-shadow:0 0 28px rgba(212,160,23,.12)}
    .day-card.past{opacity:.55}
    .day-card.past .day-name{text-decoration:line-through;text-decoration-color:rgba(212,160,23,.5)}
    .day-header{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid rgba(180,130,40,.2);background:rgba(255,200,60,.05)}
    .day-card.today .day-header{background:rgba(212,160,23,.1)}
    .day-label{display:flex;align-items:baseline;gap:10px;flex:1}
    .day-name{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:#d4a017}
    .day-date{font-size:13px;color:#8a6830;font-weight:400}
    .today-badge{font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;background:rgba(212,160,23,.18);border:1px solid rgba(212,160,23,.5);color:#d4a017;padding:3px 10px;border-radius:20px;white-space:nowrap}
    .past-badge{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#4a3510;padding:3px 10px;border-radius:20px;border:1px solid rgba(180,130,40,.2)}

    .posts{padding:18px 22px;display:flex;flex-direction:column;gap:14px}

    .post-item{display:flex;gap:16px;align-items:flex-start;position:relative}

    /* auto-past (time passed) */
    .post-item.auto-past .post-title{text-decoration:line-through;text-decoration-color:rgba(212,160,23,.4);color:#5a4520}
    .post-item.auto-past .time-badge{color:#4a3510}
    .post-item.auto-past .post-dot{background:#3a2a0a;border-color:#3a2a0a}

    /* manually marked done */
    .post-item.done .post-title{text-decoration:line-through;text-decoration-color:rgba(40,180,80,.5);color:#3a6040}
    .post-item.done .time-badge{color:#2a5030}
    .post-item.done .post-dot{background:#1a6030;border-color:#1a6030}
    .post-item.done .done-btn{color:#1a7a40 !important}

    .time-col{min-width:86px;display:flex;flex-direction:column;align-items:flex-end;padding-top:2px}
    .time-badge{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:#c49010;white-space:nowrap}
    .post-connector{display:flex;flex-direction:column;align-items:center;padding-top:4px}
    .post-dot{width:9px;height:9px;border-radius:50%;background:#d4a017;border:1px solid rgba(212,160,23,.5);flex-shrink:0;transition:background .3s}
    .post-line{width:1px;flex:1;background:rgba(180,130,40,.25);min-height:24px}
    .post-item:last-child .post-line{display:none}
    .post-content{flex:1;padding-bottom:6px}
    .post-title{font-size:15px;font-weight:500;color:#e8d9b5;line-height:1.4;transition:color .3s}
    .post-note{font-size:12px;color:#7a5c28;margin-top:3px}

    /* action buttons */
    .post-actions{display:flex;gap:4px;align-items:center;padding-top:2px;flex-shrink:0}
    .done-btn,.delete-btn{background:none;border:none;font-size:17px;cursor:pointer;padding:3px 5px;line-height:1;border-radius:6px;transition:all .2s}
    .done-btn{color:#2a4a30}
    .done-btn:hover{color:#1a9a50;background:rgba(30,120,60,.1)}
    .delete-btn{color:#3a2a0a}
    .delete-btn:hover{color:#c04020;background:rgba(180,40,20,.1)}

    footer{text-align:center;margin-top:60px;font-family:'Cinzel',serif;font-size:12px;color:#3a2a0a;letter-spacing:3px;text-transform:uppercase}
    footer span{font-size:16px;vertical-align:middle;margin:0 8px}
  </style>
</head>
<body>

<header>
  <div class="skull-row">— ✦ — ✦ — ✦ —</div>
  <h1>Stand Up 2k26</h1>
  <p class="subtitle">Marketing Content Schedule</p>
  <div class="divider"><span>⚓</span></div>
  <p class="live-clock" id="clock"></p>
</header>

<main id="timeline"></main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2>⚓ Add to the Timeline</h2>
    <div class="field">
      <label>Date</label>
      <input type="date" id="inp-date"/>
    </div>
    <div class="field">
      <label>Time</label>
      <input type="time" id="inp-time"/>
    </div>
    <div class="field">
      <label>Post Title</label>
      <input type="text" id="inp-title" placeholder="e.g. Episode 3 drop"/>
    </div>
    <div class="field">
      <label>Note / Type (optional)</label>
      <input type="text" id="inp-note" placeholder="e.g. 🎬 Video post"/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveEntry()">Add to Schedule</button>
    </div>
  </div>
</div>

<footer>
  <span>☠</span> Stand Up 2k26 — Marketing Command <span>☠</span>
</footer>

<script>
const KEY = 'standup2k26_v2';
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function load(){ try{ return JSON.parse(localStorage.getItem(KEY))||[]; }catch(e){ return []; } }
function save(a){ localStorage.setItem(KEY, JSON.stringify(a)); }
function uid(){ return Math.random().toString(36).slice(2,9); }
function todayStr(){ return new Date().toISOString().slice(0,10); }

function fmt12(t){
  if(!t) return 'TBD';
  const [h,m]=t.split(':').map(Number);
  return `${h%12||12}:${m.toString().padStart(2,'0')} ${h>=12?'PM':'AM'}`;
}
function dayName(d){ const [y,mo,day]=d.split('-').map(Number); return DAYS[new Date(y,mo-1,day).getDay()]; }
function dateName(d){ const [y,mo,day]=d.split('-').map(Number); return `${MONTHS[mo-1]} ${day}, ${y}`; }

function seedDefaults(){
  if(load().length>0) return;
  const b=new Date(); b.setHours(0,0,0,0);
  function ds(n){ const d=new Date(b); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  save([
    {id:uid(),date:ds(0),time:'15:00',title:'Quiz for the Delegates',note:'⚡ Interactive post',done:false},
    {id:uid(),date:ds(0),time:'21:00',title:'Second Round of Registration',note:'📋 Registration announcement',done:false},
    {id:uid(),date:ds(1),time:'',title:"Why Delegates Can't Make It — Problems & Solutions",note:'📢 Awareness post',done:false},
    {id:uid(),date:ds(2),time:'',title:'Episode 2',note:'🎬 Video / Episode drop',done:false},
  ]);
}

function toggleDone(id){
  const entries=load();
  const e=entries.find(x=>x.id===id);
  if(e) e.done=!e.done;
  save(entries);
  render();
}

function removeEntry(id){
  if(!confirm('Remove this post from the schedule?')) return;
  save(load().filter(e=>e.id!==id));
  render();
}

function render(){
  const entries=load();
  const today=todayStr();
  const now=new Date();
  const groups={};
  entries.forEach(e=>{ if(!groups[e.date]) groups[e.date]=[]; groups[e.date].push(e); });
  const dates=Object.keys(groups).sort();
  const main=document.getElementById('timeline');
  main.innerHTML='';

  dates.forEach(dateStr=>{
    const isPast=dateStr<today;
    const isToday=dateStr===today;
    const card=document.createElement('div');
    card.className='day-card'+(isToday?' today':isPast?' past':'');

    let badge='';
    if(isToday) badge='<span class="today-badge">⚑ Today</span>';
    else if(isPast) badge='<span class="past-badge">✓ Done</span>';

    card.innerHTML=`
      <div class="day-header">
        <div class="day-label">
          <span class="day-name">${dayName(dateStr)}</span>
          <span class="day-date">${dateName(dateStr)}</span>
        </div>
        ${badge}
      </div>
      <div class="posts" id="p-${dateStr}"></div>`;

    const postsEl=card.querySelector(`#p-${dateStr}`);
    const sorted=groups[dateStr].sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));

    sorted.forEach(entry=>{
      let autoPast=isPast;
      if(isToday&&entry.time){
        const [h,m]=entry.time.split(':').map(Number);
        const pt=new Date(); pt.setHours(h,m,0,0);
        autoPast=now>pt;
      }

      const isDone=!!entry.done;
      let cls='post-item';
      if(isDone) cls+=' done';
      else if(autoPast) cls+=' auto-past';

      const doneTitle=isDone?'Mark as not done':'Mark as done';
      const doneIcon=isDone?'✅':'☑';

      const item=document.createElement('div');
      item.className=cls;
      item.innerHTML=`
        <div class="time-col"><span class="time-badge">${fmt12(entry.time)}</span></div>
        <div class="post-connector"><div class="post-dot"></div><div class="post-line"></div></div>
        <div class="post-content">
          <p class="post-title">${entry.title}</p>
          ${entry.note?`<p class="post-note">${entry.note}</p>`:''}
        </div>
        <div class="post-actions">
          <button class="done-btn" title="${doneTitle}" onclick="toggleDone('${entry.id}')">${doneIcon}</button>
          <button class="delete-btn" title="Delete post" onclick="removeEntry('${entry.id}')">🗑</button>
        </div>`;
      postsEl.appendChild(item);
    });

    main.appendChild(card);
  });

  const addBtn=document.createElement('button');
  addBtn.className='add-btn';
  addBtn.innerHTML='⚓ &nbsp; ADD NEW POST TO TIMELINE';
  addBtn.onclick=openModal;
  main.appendChild(addBtn);
}

function openModal(){
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('inp-date').value=todayStr();
  document.getElementById('inp-time').value='';
  document.getElementById('inp-title').value='';
  document.getElementById('inp-note').value='';
}
function closeModal(){ document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

function saveEntry(){
  const date=document.getElementById('inp-date').value;
  const time=document.getElementById('inp-time').value;
  const title=document.getElementById('inp-title').value.trim();
  const note=document.getElementById('inp-note').value.trim();
  if(!date||!title){ alert('Please fill in at least the date and post title.'); return; }
  const entries=load();
  entries.push({id:uid(),date,time,title,note,done:false});
  save(entries);
  closeModal();
  render();
}

function updateClock(){
  const n=new Date();
  const h=n.getHours(),m=n.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock').textContent=
    `${DAYS[n.getDay()]}, ${MONTHS[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}  ·  ${h%12||12}:${m} ${h>=12?'PM':'AM'}`;
}

seedDefaults();
render();
updateClock();
setInterval(()=>{ updateClock(); render(); },60000);
</script>
</body>
</html>
